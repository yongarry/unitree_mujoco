robot: "g1"  # Robot name, "go2", "b2", "b2w", "h1", "go2w", "g1"
robot_scene: "scene_29dof.xml" # Robot scene, /unitree_robots/[robot]/scene.xml 

domain_id: 0  # Domain id
interface: "lo" # Interface 

use_joystick: 0 # Simulate Unitree WirelessController using a gamepad
joystick_type: "xbox" # support "xbox" and "switch" gamepad layout
joystick_device: "/dev/input/js0" # Device path
joystick_bits: 16 # Some game controllers may only have 8-bit accuracy

print_scene_information: 1 # Print link, joint and sensors information of robot

enable_elastic_band: 0 # Virtual spring band, used for lifting h1

# MJCF <keyframe> applied when a scene is loaded (before viewer shows the model).
# initial_keyframe_index: -1 disables; >=0 selects key by index. If initial_keyframe_name
# is non-empty, it wins (mj_name2id mjOBJ_KEY). Hotkeys: L = load current key, [ ] = prev/next key.
initial_keyframe_index: 0
initial_keyframe_name: ""
